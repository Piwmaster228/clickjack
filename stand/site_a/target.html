<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        button {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            cursor: pointer;
            color: transparent;
            font-size: 1px;
        }
    </style>
</head>
<body>
    <button id="confirmBtn">Подтвердить действие</button>
    <script>
        document.getElementById('confirmBtn').addEventListener('click', function () {
            window.parent.postMessage({ type: 'clickjack_triggered', site: 'a' }, '*');
        });
    </script>
</body>
</html>
